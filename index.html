<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Login & Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h2 id="form-title">Login</h2>
            <p id="form-desc">Welcome back! Please enter your details.</p>
            
            <p id="error-msg"></p>

            <div class="input-group">
                <input id="username" type="text" placeholder="Username" required>
                <input id="password" type="password" placeholder="Password" required>
            </div>

            <button id="main-btn">Login</button>
            
            <div class="footer-text">
                <span id="footer-question">Don't have an account?</span> 
                <a href="#" id="toggle-link">Sign Up</a>
            </div>
        </div>

        <div id="admin-panel" style="display: none;">
            <h3>Registered Users List</h3>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Password</th>
                    </tr>
                </thead>
                <tbody id="userListBody"></tbody>
            </table>
            <button onclick="location.reload()" style="margin-top:10px; background:#64748b;">Logout Admin</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
